name: Prevent unauthorized workflows
on:
  pull_request_target:
jobs:
    check-author:
      runs-on: ubuntu-latest
      permissions:
        contents: read
        pull-requests: read
      steps:
        - name: Get changed files
          id: changed_files
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
            FILES=$(gh pr view ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --json files --jq '.files[].path')
          
            echo "Changed files: $FILES"
          
            if echo "$FILES" | grep -q "^\.github/workflows/"; then
              echo "workflow_changed=true" >> $GITHUB_OUTPUT
            else
              echo "workflow_changed=false" >> $GITHUB_OUTPUT
            fi
        - name: Check if PR author is authorized
          if: steps.changed_files.outputs.workflow_changed == 'true'
          id: plan
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
            AUTHOR=$(jq -r '.sender.login' $GITHUB_EVENT_PATH)
            MEMBERS='sandeep'
            
            if [[ ! " $MEMBERS " =~ " $AUTHOR " ]]; then
              echo "UNAUTHORIZED_AUTHOR=$AUTHOR" >> $GITHUB_ENV
              echo "Only members of the '$ALLOWED_TEAM' team can create or modify workflow files."
              exit 1
            fi

            echo "$AUTHOR is authorized to modify workflow files"

        - name: Slack failure notification
          uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
          if: failure() && steps.plan.outcome == 'failure'
          with:
            webhook-type: incoming-webhook
            payload: |
              {
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": ":no_entry: *Unauthorized Workflow Change Detected!*"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.workflow }}>"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Job:*\n${{ github.job }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Repo:*\n${{ github.repository }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Unauthorized Author:*\n${{ env.UNAUTHORIZED_AUTHOR }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*PR:*\n<${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }}>"
                      }
                    ]
                  }
                ]
              }
          env:
            SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
